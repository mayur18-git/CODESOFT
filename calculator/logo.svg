<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- dark body gradient -->
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#2a2a2e"/>
      <stop offset="100%" stop-color="#1a1a1c"/>
    </linearGradient>
    <!-- orange glow gradient for = button -->
    <linearGradient id="eqGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ffb340"/>
      <stop offset="100%" stop-color="#e8870a"/>
    </linearGradient>
    <!-- screen gradient -->
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#111113"/>
      <stop offset="100%" stop-color="#0a0a0c"/>
    </linearGradient>
    <!-- orange glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- subtle drop shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- ── Outer shell ── -->
  <rect width="512" height="512" rx="96" fill="url(#bodyGrad)" filter="url(#shadow)"/>

  <!-- ── Subtle inner border ring ── -->
  <rect x="2" y="2" width="508" height="508" rx="95"
        fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>

  <!-- ── Display screen ── -->
  <rect x="52" y="52" width="408" height="148" rx="20" fill="url(#screenGrad)"/>
  <!-- screen inner border -->
  <rect x="52" y="52" width="408" height="148" rx="20"
        fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1.5"/>

  <!-- orange accent bar at bottom of screen -->
  <rect x="52" y="188" width="408" height="4" rx="2" fill="#ff9f0a" opacity="0.9"/>

  <!-- display number "0" — large, right-aligned style -->
  <text x="440" y="162"
        font-family="-apple-system, SF Pro Display, Inter, sans-serif"
        font-size="88" font-weight="200"
        fill="white" text-anchor="end"
        opacity="0.92">0</text>

  <!-- blinking cursor dot -->
  <rect x="448" y="118" width="6" height="52" rx="3" fill="#ff9f0a" opacity="0.85"/>

  <!-- ── Button grid  4 cols × 4 rows ── -->
  <!-- gap = 20px, btn = 88px wide, 72px tall, start x=52, y=220 -->

  <!-- ROW 1 — fn buttons (grey) + operator (orange) -->
  <!-- AC -->
  <rect x="52"  y="220" width="88" height="64" rx="32" fill="#505053"/>
  <text x="96"  y="262" font-family="Inter,sans-serif" font-size="26" font-weight="600"
        fill="white" text-anchor="middle">AC</text>

  <!-- +/− -->
  <rect x="160" y="220" width="88" height="64" rx="32" fill="#505053"/>
  <text x="204" y="262" font-family="Inter,sans-serif" font-size="30" font-weight="400"
        fill="white" text-anchor="middle">+/−</text>

  <!-- % -->
  <rect x="268" y="220" width="88" height="64" rx="32" fill="#505053"/>
  <text x="312" y="262" font-family="Inter,sans-serif" font-size="30" font-weight="400"
        fill="white" text-anchor="middle">%</text>

  <!-- ÷ (orange) -->
  <rect x="376" y="220" width="84" height="64" rx="32" fill="url(#eqGrad)" filter="url(#glow)"/>
  <text x="418" y="263" font-family="Inter,sans-serif" font-size="36" font-weight="300"
        fill="white" text-anchor="middle">÷</text>

  <!-- ROW 2 — 7 8 9 × -->
  <rect x="52"  y="304" width="88" height="64" rx="32" fill="#333335"/>
  <text x="96"  y="346" font-family="Inter,sans-serif" font-size="30" font-weight="400"
        fill="white" text-anchor="middle">7</text>

  <rect x="160" y="304" width="88" height="64" rx="32" fill="#333335"/>
  <text x="204" y="346" font-family="Inter,sans-serif" font-size="30" font-weight="400"
        fill="white" text-anchor="middle">8</text>

  <rect x="268" y="304" width="88" height="64" rx="32" fill="#333335"/>
  <text x="312" y="346" font-family="Inter,sans-serif" font-size="30" font-weight="400"
        fill="white" text-anchor="middle">9</text>

  <rect x="376" y="304" width="84" height="64" rx="32" fill="url(#eqGrad)" filter="url(#glow)"/>
  <text x="418" y="347" font-family="Inter,sans-serif" font-size="36" font-weight="300"
        fill="white" text-anchor="middle">×</text>

  <!-- ROW 3 — 4 5 6 − -->
  <rect x="52"  y="388" width="88" height="64" rx="32" fill="#333335"/>
  <text x="96"  y="430" font-family="Inter,sans-serif" font-size="30" font-weight="400"
        fill="white" text-anchor="middle">4</text>

  <rect x="160" y="388" width="88" height="64" rx="32" fill="#333335"/>
  <text x="204" y="430" font-family="Inter,sans-serif" font-size="30" font-weight="400"
        fill="white" text-anchor="middle">5</text>

  <rect x="268" y="388" width="88" height="64" rx="32" fill="#333335"/>
  <text x="312" y="430" font-family="Inter,sans-serif" font-size="30" font-weight="400"
        fill="white" text-anchor="middle">6</text>

  <rect x="376" y="388" width="84" height="64" rx="32" fill="url(#eqGrad)" filter="url(#glow)"/>
  <text x="418" y="431" font-family="Inter,sans-serif" font-size="40" font-weight="200"
        fill="white" text-anchor="middle">−</text>

  <!-- ROW 4 — 1 2 3 + -->
  <rect x="52"  y="472" width="88" height="64" rx="32" fill="#333335"/>
  <text x="96"  y="514" font-family="Inter,sans-serif" font-size="30" font-weight="400"
        fill="white" text-anchor="middle">1</text>

  <rect x="160" y="472" width="88" height="64" rx="32" fill="#333335"/>
  <text x="204" y="514" font-family="Inter,sans-serif" font-size="30" font-weight="400"
        fill="white" text-anchor="middle">2</text>

  <rect x="268" y="472" width="88" height="64" rx="32" fill="#333335"/>
  <text x="312" y="514" font-family="Inter,sans-serif" font-size="30" font-weight="400"
        fill="white" text-anchor="middle">3</text>

  <rect x="376" y="472" width="84" height="64" rx="32" fill="url(#eqGrad)" filter="url(#glow)"/>
  <text x="418" y="515" font-family="Inter,sans-serif" font-size="40" font-weight="200"
        fill="white" text-anchor="middle">+</text>

</svg>
