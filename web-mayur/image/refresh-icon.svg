<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="32" height="32" fill="none">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!--
    Arc: starts at top (12,3), sweeps ~300° clockwise, ends near top-left
    Arrowhead points in the clockwise direction at arc end
  -->
  <path
    d="M 19.07 7 A 8 8 0 1 1 4.93 17"
    stroke="url(#g)"
    stroke-width="1.9"
    stroke-linecap="round"
    fill="none"
    filter="url(#glow)"
  />

  <!-- Arrowhead at arc end (near bottom-left, pointing down-left clockwise) -->
  <polyline
    points="7.5,19.5 4.6,17.2 2.5,19.8"
    stroke="url(#g)"
    stroke-width="1.9"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    filter="url(#glow)"
  />
</svg>
