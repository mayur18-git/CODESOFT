<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#0055ff"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="2" y="2" width="60" height="60" rx="14" ry="14" fill="url(#bgGrad)"/>

  <!-- Neon border -->
  <rect x="2" y="2" width="60" height="60" rx="14" ry="14"
        fill="none" stroke="url(#borderGrad)" stroke-width="2.5" filter="url(#glow)"/>

  <!-- Letter M (cyan gradient) -->
  <text x="5" y="46"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="36" font-weight="800"
        fill="url(#borderGrad)"
        filter="url(#glow)">M</text>

  <!-- Letter K (white) -->
  <text x="34" y="46"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="36" font-weight="800"
        fill="#ffffff">K</text>

  <!-- Bottom dot accent -->
  <circle cx="32" cy="56" r="2.5" fill="#00f0ff" opacity="0.8" filter="url(#glow)"/>
</svg>
